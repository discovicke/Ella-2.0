@if (confirmService.isOpen()) {
  <div
    class="confirm-backdrop"
    [class.open]="confirmService.isOpen()"
    (click)="onBackdropClick($event)"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="confirmService.title()"
  >
    <div class="confirm-content" [attr.data-shake]="shakeCounter()">
      <div class="confirm-header">
        <span
          class="confirm-icon"
          [class]="'confirm-icon confirm-icon-' + confirmService.icon()"
          aria-hidden="true"
        >
          @switch (confirmService.icon()) {
            @case ('warning') {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
                />
              </svg>
            }
            @case ('question') {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"
                />
              </svg>
            }
            @default {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M11.25 11.25l.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0zm-9-3.75h.008v.008H12V8.25z"
                />
              </svg>
            }
          }
        </span>
        <h3 class="confirm-title">{{ confirmService.title() }}</h3>
      </div>

      <p class="confirm-message">{{ confirmService.message() }}</p>

      <div class="confirm-actions">
        <button
          class="confirm-btn confirm-btn-cancel"
          (click)="confirmService.cancel()"
          type="button"
        >
          {{ confirmService.cancelText() }}
        </button>
        <button
          class="confirm-btn"
          [class.confirm-btn-danger]="confirmService.dangerConfirm()"
          [class.confirm-btn-primary]="!confirmService.dangerConfirm()"
          (click)="confirmService.confirm()"
          type="button"
        >
          {{ confirmService.confirmText() }}
        </button>
      </div>
    </div>
  </div>
}
