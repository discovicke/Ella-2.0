<header class="top-header">
  <div class="logo-group">
    <button class="menu-button" (click)="layoutService.toggleSidebar()" aria-label="Menu">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="menu-icon"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
        />
      </svg>
    </button>
    <img class="top-logo" src="assets/ELLA-header.png" alt="ELLA – rumbokningssystem" />
  </div>

  <div class="user-actions">
    <div class="user-box" *ngIf="sessionService.currentUser() as user">
      <span class="user-icon" aria-hidden="true">👤</span>
      <div class="user-info">
        <span class="user-label">{{ user.displayName || user.email }}</span>
        <span class="user-role">{{ resolveRoleLabel(user.permissions) }}</span>
      </div>
    </div>

    <app-button variant="secondary" (clicked)="logout()"> Logga ut </app-button>
  </div>
</header>
