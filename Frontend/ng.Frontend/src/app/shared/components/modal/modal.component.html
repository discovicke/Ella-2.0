@if (modalService.isOpen()) {
  <div class="modal-backdrop" (click)="onBackdropClick($event)">
    <div 
      class="modal-container" 
      [style.max-width]="modalService.options().width || '500px'"
      role="dialog" 
      aria-modal="true">
      
      <!-- Header -->
      <header class="modal-header">
        <h2 class="modal-title">
          {{ modalService.options().title || 'Information' }}
        </h2>
        
        @if (!modalService.options().hideCloseButton) {
          <button class="close-btn" (click)="modalService.close()" aria-label="Stäng">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        }
      </header>

      <!-- Body (Dynamic Content) -->
      <div class="modal-body">
        <ng-container *ngComponentOutlet="modalService.activeComponent()"></ng-container>
      </div>

    </div>
  </div>
}
