<div class="manage-users-container">
  <header class="page-header">
    <h1>Hantera användare</h1>
    <app-button variant="primary" (clicked)="openAddUserModal()">
      + Skapa användare
    </app-button>
  </header>

  <div class="user-list">
    @if (userResource.isLoading()) {
      <p>Laddar användare...</p>
    } @else {
      @for(user of userResource.value() ?? []; track user.id) {
        <div class="user-card">
          <div class="user-info">
            <span class="user-name">{{ user.displayName }}</span>
            <span class="user-email">{{ user.email }}</span>
            <span class="user-role-badge" [class]="user.role.toLowerCase()">{{ user.role }}</span>
          </div>
          <app-button variant="tertiary" (clicked)="openEditUserModal(user)">
            Redigera
          </app-button>
        </div>
      } @empty {
        <p>Inga användare hittades.</p>
      }
    }
  </div>
</div>
