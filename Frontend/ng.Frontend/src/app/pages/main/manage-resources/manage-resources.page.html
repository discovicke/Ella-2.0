<div class="page-container">
  <div class="page-content">
    <div class="page-header">
      <div class="header-text">
        <h1>Hantera Resurser</h1>
        <p>Skapa och hantera bokningsbara resurser som fordon och utrustning.</p>
      </div>
      <div class="header-actions">
        <app-button variant="secondary" (clicked)="openCategoryModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; margin-right: 6px; display: inline-block; vertical-align: middle;">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
          Hantera Kategorier
        </app-button>
        <app-button variant="primary" (clicked)="openCreateResourceModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; margin-right: 6px; display: inline-block; vertical-align: middle;">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Ny Resurs
        </app-button>
      </div>
    </div>

    <div class="table-card">
      <app-table
        [data]="resourcesResource.value() || []"
        [columns]="columns"
        [isLoading]="resourcesResource.isLoading()"
        [total]="(resourcesResource.value() || []).length"
        emptyMessage="Inga resurser hittades."
      >
      </app-table>
    </div>
  </div>
</div>

<!-- Templates -->
<ng-template #actionsTpl let-res>
  <div class="table-actions">
    <button class="delete-btn" (click)="deleteResource(res)" title="Ta bort resurs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
    </button>
  </div>
</ng-template>
