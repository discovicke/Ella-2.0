<!-- Mobile-only header bar -->
<div class="mobile-header">
  <button class="menu-button" (click)="layoutService.toggleSidebar()" aria-label="Menu">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
      />
    </svg>
  </button>
  <span class="mobile-title">ELLA</span>
</div>

<div class="main-layout">
  <div
    class="sidebar-backdrop"
    [class.show]="layoutService.isSidebarOpen()"
    (click)="layoutService.closeSidebar()"
  ></div>

  <aside class="sidebar" [class.open]="layoutService.isSidebarOpen()">
    <!-- Desktop & Mobile Header -->
    <div class="sidebar-header">
      <img class="sidebar-logo" src="assets/ELLA-header.png" alt="ELLA" />
    </div>

    <!-- Desktop & Mobile User Info -->
    <div class="sidebar-user" *ngIf="sessionService.currentUser() as user">
      <div class="sidebar-user-info">
        <span class="user-icon">👤</span>
        <div class="user-details">
          <span class="user-name">{{ user.displayName || user.email }}</span>
          <span class="user-role" [ngClass]="user.role.toLowerCase()">{{ user.role }}</span>
        </div>
      </div>
    </div>

    <!-- Section: Bokning -->
    <div class="nav-section">
      <h3 class="nav-header">Bokning</h3>
      <nav>
        <ul>
          <li>
            <a
              routerLink="/see-bookings"
              routerLinkActive="active"
              (click)="layoutService.closeSidebar()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="nav-icon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"
                />
              </svg>
              <span class="text">Mina Bokningar</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/book-room"
              routerLinkActive="active"
              (click)="layoutService.closeSidebar()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="nav-icon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              <span class="text">Boka Rum</span>
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Section: System -->
    <div class="nav-section">
      <h3 class="nav-header">System</h3>
      <nav>
        <ul>
          <li>
            <a
              routerLink="/system-overview"
              routerLinkActive="active"
              (click)="layoutService.closeSidebar()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="nav-icon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"
                />
              </svg>
              <span class="text">Systemöversikt</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/manage-users"
              routerLinkActive="active"
              (click)="layoutService.closeSidebar()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="nav-icon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"
                />
              </svg>
              <span class="text">Hantera användare</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/manage-rooms"
              routerLinkActive="active"
              (click)="layoutService.closeSidebar()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="nav-icon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008zm0 3h.008v.008h-.008v-.008zm0 3h.008v.008h-.008v-.008z"
                />
              </svg>
              <span class="text">Hantera rum</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/manage-bookings"
              routerLinkActive="active"
              (click)="layoutService.closeSidebar()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="nav-icon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.25 2.25 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"
                />
              </svg>
              <span class="text">Hantera bokningar</span>
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Desktop & Mobile Footer -->
    <div class="sidebar-footer">
      <button class="logout-button" (click)="logout()">
        <svg
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="nav-icon"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"
          />
        </svg>
        <span>Logga ut</span>
      </button>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
