<div class="manage-campuses-container">
  <div class="filter-panel">
    <div class="filter-header">
      <div class="header-left">
        <svg
          class="header-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3H21m-3.75 3H21"
          />
        </svg>
        <h2>Campus</h2>
      </div>
      <div class="header-right">
        @if (hasActiveFilters()) {
          <span class="result-count"
            >Visar {{ totalCampuses() }} av {{ totalAllCampuses() }} campus</span
          >
          <button class="btn-reset" (click)="resetFilters()" title="Rensa filter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
            </svg>
            Rensa
          </button>
        }
        <app-button class="action-btn-desktop" variant="primary" (clicked)="openAddCampusModal()">
          + Skapa campus
        </app-button>
      </div>
    </div>

    <div class="filter-body">
      <div class="search-field">
        <label class="filter-label">Sök</label>
        <div class="search-input">
          <svg
            class="field-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            type="text"
            placeholder="Sök på stad, adress eller kontakt..."
            (input)="updateSearch($event)"
            [value]="searchQuery()"
          />
        </div>
      </div>
    </div>
  </div>

  <button class="fab-create" (click)="openAddCampusModal()" title="Skapa campus">
    <svg
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
    >
      <line x1="12" y1="5" x2="12" y2="19" />
      <line x1="5" y1="12" x2="19" y2="12" />
    </svg>
  </button>

  <div class="campus-content">
    <app-table
      [data]="paginatedCampuses()"
      [columns]="columns"
      [isLoading]="campusResource.isLoading()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      [total]="totalCampuses()"
      [autoSize]="true"
      (pageChange)="handlePageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (rowClicked)="openEditCampusModal($event)"
      emptyMessage="Inga campus hittades."
    ></app-table>

    <ng-template #cityTpl let-campus>
      <strong>{{ campus.city }}</strong>
    </ng-template>

    <ng-template #streetTpl let-campus>
      {{ campus.street }}
    </ng-template>

    <ng-template #contactTpl let-campus>
      @if (campus.contact) {
        <span>{{ campus.contact }}</span>
      } @else {
        <span class="muted">–</span>
      }
    </ng-template>

    <ng-template #actionsTpl let-campus>
      <button
        class="row-action-btn"
        (click)="openEditCampusModal(campus, $event)"
        title="Redigera campus"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
      </button>
    </ng-template>
  </div>
</div>
